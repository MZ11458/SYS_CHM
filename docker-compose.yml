version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: room-booking-postgres
    environment:
      POSTGRES_DB: room_booking
      POSTGRES_USER: room_user
      POSTGRES_PASSWORD: room_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  postgres_data:
