# Replace REPLACE_WITH_* placeholders before applying.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: room-booking-frontend
  template:
    metadata:
      labels:
        app: room-booking-frontend
    spec:
      containers:
        - name: web
          image: REPLACE_WITH_FRONTEND_IMAGE
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  type: LoadBalancer
  selector:
    app: room-booking-frontend
  ports:
    - port: 80
      targetPort: 80
